name: Backend Blue-Green CI/CD

on:
  push:
    #main 브랜치의 backend 폴더에 코드가 들어왔을 때 작동
    branches: [ "main" ]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  # 빌드 단계
  build:
    #우분투 환경의 가상 컴퓨터 대여
    runs-on: ubuntu-latest

    #이제부터 순서대로 할 일
    steps:
      #현재 내 깃허브 코드를 이 가상 컴퓨터로 가져옴
      - uses: actions/checkout@v4
      #자바 21환경을 설치
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          #빌드 속도를 높이기 위해 필요한 라이브러리 캐싱
          cache: gradle


      # base64로 저장된 Secrets를 다시 파일로 복원
      - name: Decode and Create application-prod.yml
        run: |
          mkdir -p backend/src/main/resources
          echo "${{ secrets.APPLICATION_PROD }}" | base64 --decode > backend/src/main/resources/application-prod.yml

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew


      # 테스트를 포함한 빌드 (실패 시 배포 중단)
      - name: Build with Gradle
        working-directory: ./backend
        run: ./gradlew clean build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker 빌드 및 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # 커밋 해시와 latest 태그를 동시에 부여하여 관리 편의성 증대
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.BACKEND_IMAGE_NAME }}:${{secrets.BACKEND_IMAGE_TAG}}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          # 빌드 캐시 활용으로 속도 향상
          cache-from: type=gha
          cache-to: type=gha,mode=max


  deploy:
    needs: build # 빌드 단계가 성공해야만 실행됩니다.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

        # 1. 로컬 Runner에서 .env 파일 생성 (전송 준비)
      - name: Create .env file
        run: |
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> backend/deployment/.env
          echo "BACKEND_IMAGE_NAME=${{ secrets.BACKEND_IMAGE_NAME }}" >> backend/deployment/.env
          echo "BACKEND_IMAGE_TAG=${{ github.sha }}" >> backend/deployment/.env
          #echo "${{ secrets.ENV_PROD }}" >> backend/deployment/.env
        

      # 2. 파일 전송
      - name: Copy deployment files to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # backend/deployment/ 안에 있는 모든 것을 전송
          source: "backend/deployment/*"
          # EC2의 이 폴더 바로 아래에 파일들이 위치하게 됨
          target: "/home/ubuntu/backend-deploy"
          # 앞의 'backend/deployment/' 경로를 떼어내고 알맹이만 보냄
          strip_components: 2
          overwrite: true


      # 3. 배포 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_IMAGE_TAG, DOCKERHUB_USERNAME, BACKEND_IMAGE_NAME
          script: |
            export DOCKER_IMAGE_TAG=${{ github.sha }}
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export BACKEND_IMAGE_NAME=${{ secrets.BACKEND_IMAGE_NAME }}
            
            # 전송된 위치로 이동
            cd /home/ubuntu/backend-deploy
            
            # 파일 리스트 확인 (디버깅용 - 나중에 지워도 됨)
            ls -al
            
            # 실행 권한 부여 및 스크립트 실행
            chmod +x deploy.sh
            ./deploy.sh






            
            
            
            
            
            
            
            
            
            
            
            
